name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for manual artifacts, for example v0.1.0"
        required: false
        default: "dev"

permissions:
  contents: write

env:
  BIN_NAME: cboard
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: codex-board

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            exe_suffix: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            exe_suffix: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            exe_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            exe_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            exe_suffix: ".exe"
    env:
      EXE_SUFFIX: ${{ matrix.exe_suffix }}
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Resolve package version
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME:-dev}"
          fi
          version="${version//\//-}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "$TARGET"

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target "$TARGET"

      - name: Verify Linux binary is static
        if: runner.os == 'Linux'
        shell: bash
        run: |
          binary="target/$TARGET/release/$BIN_NAME$EXE_SUFFIX"
          file "$binary" | tee binary-info.txt
          grep -qi "static" binary-info.txt

      - name: Package archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="$PACKAGE_NAME-$RELEASE_VERSION-$TARGET"
          mkdir -p "dist/$archive"
          cp "target/$TARGET/release/$BIN_NAME$EXE_SUFFIX" "dist/$archive/"
          cp README.md "dist/$archive/"
          if [ -f LICENSE ]; then
            cp LICENSE "dist/$archive/"
          fi
          tar -C dist -czf "dist/$archive.tar.gz" "$archive"
          if command -v shasum >/dev/null 2>&1; then
            (cd dist && shasum -a 256 "$archive.tar.gz" > "$archive.tar.gz.sha256")
          else
            (cd dist && sha256sum "$archive.tar.gz" > "$archive.tar.gz.sha256")
          fi

      - name: Package archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "$env:PACKAGE_NAME-$env:RELEASE_VERSION-$env:TARGET"
          New-Item -ItemType Directory -Force "dist/$archive" | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:BIN_NAME$env:EXE_SUFFIX" "dist/$archive/"
          Copy-Item "README.md" "dist/$archive/"
          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "dist/$archive/"
          }
          Compress-Archive -Path "dist/$archive/*" -DestinationPath "dist/$archive.zip" -Force
          $hash = (Get-FileHash "dist/$archive.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archive.zip" | Out-File -FilePath "dist/$archive.zip.sha256" -Encoding ascii

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        shell: bash
        run: |
          cd dist
          cat ./*.sha256 > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
